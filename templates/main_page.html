<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мессенджер - {{ acc }}</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="/static/styles/index.css">
</head>
<body>
    <div class="sidebar">
        <div class="user-info">
            <p id="account">{{ acc }}</p>
            <a href="/logout" class="logout-btn">Выйти</a>
        </div>
        <div class="chats" id="chats">
            {{ chats | safe }}
        </div>
        <div>
            <button id="create_new_chat" class="logout-btn">Создать чат</button>
        </div>
    </div>
    
    <div class="main-chat">
        <div class="chat-header">
            <h2 id="current-chat-name">Общий чат</h2>
        </div>
        <div class="messages" id="messages"></div>
        <div class="message-input-area">
            <textarea class="message-input" id="message-input" placeholder="Введите сообщение..." rows="1"></textarea>
            <button class="send-btn" id="send-btn">📤</button>
        </div>
    </div>
    <div class="dark-block" id="dark-block">
        <div class="create-form-block">
            <form action="/api/create_private_chat" method="post" class="create-form">
                <h3>Создать приватный канал (1-на-1)</h3>
                <label for="user1" class="create-form-label">Введите имя второго пользователя</label>
                <input type="text" class="create-form-input" id="user1" name="user1">
                <button type="submit" class="submit-btn">Создать</button>
            </form>
            <button id="cancel">X</button>
        </div> 
    </div>
    <script src="/static/js/main.js"></script>
</body>
</html>
